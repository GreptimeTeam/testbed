# haproxy exposes the CLIENT-FACING ports (11040-11043) and load-balances the
# internal frontend instance(s). Frontend instances are NOT exposed to clients
# directly; add more `server frontend-N ...` lines here as you scale.
#
#   frontend-0 -> 127.0.0.1:11050 (http) / 11051 (grpc) / 11052 (mysql) / 11053 (pg)
#   frontend-1 -> 127.0.0.1:11054 (http) / 11055 (grpc) / 11056 (mysql) / 11057 (pg)
#
# In single-node mode (standalone / standalone-fs) haproxy is not used; those
# modes bind 11040-11043 directly, so the same client code works everywhere.
global
  maxconn 256

defaults
  mode tcp
  timeout connect 5s
  timeout client 10m
  timeout server 10m
  retries 3

frontend fe_http
  bind *:11040
  mode http
  default_backend be_http

frontend fe_grpc
  bind *:11041
  default_backend be_grpc

frontend fe_mysql
  bind *:11042
  default_backend be_mysql

frontend fe_postgres
  bind *:11043
  default_backend be_postgres

backend be_http
  mode http
  option httpchk GET /health
  server frontend-0 127.0.0.1:11050 check
  server frontend-1 127.0.0.1:11054 check

backend be_grpc
  server frontend-0 127.0.0.1:11051 check
  server frontend-1 127.0.0.1:11055 check

backend be_mysql
  server frontend-0 127.0.0.1:11052 check
  server frontend-1 127.0.0.1:11056 check

backend be_postgres
  server frontend-0 127.0.0.1:11053 check
  server frontend-1 127.0.0.1:11057 check
