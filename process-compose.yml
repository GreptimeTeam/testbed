version: "0.5"
is_tui_disabled: true

vars:
  GREPTIME_BIN: ./greptime
  GREPTIME_HOME: ./.greptimedb
  METASRV_ADDR: "127.0.0.1:11020"

processes:
  etcd:
    command: |
      etcd \
        --data-dir {{.GREPTIME_HOME}}/etcd \
        --listen-client-urls http://0.0.0.0:11001 \
        --advertise-client-urls http://127.0.0.1:11001 \
        --listen-peer-urls http://0.0.0.0:11002 \
        --initial-advertise-peer-urls http://127.0.0.1:11002 \
        --initial-cluster default=http://127.0.0.1:11002
    environment:
      - ETCDCTL_ENDPOINTS=http://127.0.0.1:11001
    readiness_probe:
      exec:
        command: "ETCDCTL_ENDPOINTS=http://127.0.0.1:11001 etcdctl endpoint health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  garage:
    command: |
      garage -c garage.toml server
    readiness_probe:
      exec:
        command: "garage -c garage.toml status"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 5
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  garage-setup:
    command: |
      GREPTIME_HOME={{.GREPTIME_HOME}} scripts/garage-setup
    depends_on:
      garage:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  metasrv:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} scripts/start-metasrv 0 0.0.0.0:11020 127.0.0.1:11020 0.0.0.0:11021
    depends_on:
      etcd:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11021/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  metasrv-1:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} scripts/start-metasrv 1 0.0.0.0:11022 127.0.0.1:11022 0.0.0.0:11023
    depends_on:
      etcd:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11023/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  datanode-0:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-datanode 0 0.0.0.0:11030 0.0.0.0:11031
    depends_on:
      metasrv:
        condition: process_healthy
      garage-setup:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11031/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  datanode-1:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-datanode 1 0.0.0.0:11032 0.0.0.0:11033
    depends_on:
      metasrv:
        condition: process_healthy
      garage-setup:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11033/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  frontend:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-frontend 0 0.0.0.0:11050 0.0.0.0:11051 127.0.0.1:11051 0.0.0.0:11052 0.0.0.0:11053
    depends_on:
      metasrv:
        condition: process_healthy
      datanode-0:
        condition: process_healthy
      datanode-1:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11050/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  frontend-1:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-frontend 1 0.0.0.0:11054 0.0.0.0:11055 127.0.0.1:11055 0.0.0.0:11056 0.0.0.0:11057
    depends_on:
      metasrv:
        condition: process_healthy
      datanode-0:
        condition: process_healthy
      datanode-1:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11054/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  haproxy:
    command: |
      haproxy -f haproxy.cfg
    depends_on:
      frontend:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11040/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  flownode:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-flownode 0 0.0.0.0:11060 127.0.0.1:11060 0.0.0.0:11061
    depends_on:
      metasrv:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11061/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  standalone:
    command: |
      GREPTIME_HOME={{.GREPTIME_HOME}} GREPTIME_BIN={{.GREPTIME_BIN}} scripts/start-standalone
    depends_on:
      garage-setup:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11040/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  standalone-fs:
    command: |
      GREPTIME_HOME={{.GREPTIME_HOME}} GREPTIME_BIN={{.GREPTIME_BIN}} scripts/start-standalone-fs
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11040/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true
