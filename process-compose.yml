version: "0.5"

vars:
  GREPTIME_BIN: ./greptime
  GREPTIME_HOME: ./.greptimedb
  METASRV_ADDR: "127.0.0.1:11020"

processes:
  etcd:
    command: |
      etcd \
        --data-dir {{.GREPTIME_HOME}}/etcd \
        --listen-client-urls http://0.0.0.0:11001 \
        --advertise-client-urls http://127.0.0.1:11001 \
        --listen-peer-urls http://0.0.0.0:11002 \
        --initial-advertise-peer-urls http://127.0.0.1:11002 \
        --initial-cluster default=http://127.0.0.1:11002
    environment:
      - ETCDCTL_ENDPOINTS=http://127.0.0.1:11001
    readiness_probe:
      exec:
        command: "ETCDCTL_ENDPOINTS=http://127.0.0.1:11001 etcdctl endpoint health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  garage:
    command: |
      rm -rf {{.GREPTIME_HOME}}/garage
      garage -c garage.toml server
    readiness_probe:
      exec:
        command: "garage -c garage.toml status"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 5
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  garage-setup:
    command: |
      GREPTIME_HOME={{.GREPTIME_HOME}} scripts/garage-setup
    depends_on:
      garage:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  metasrv:
    command: |
      mkdir -p {{.GREPTIME_HOME}}/meta
      cat > {{.GREPTIME_HOME}}/meta/metasrv.toml <<EOF
      data_home = "{{.GREPTIME_HOME}}/meta"

      [grpc]
      bind_addr = "0.0.0.0:11020"
      server_addr = "127.0.0.1:11020"

      [http]
      addr = "0.0.0.0:11021"

      [logging]
      dir = "{{.GREPTIME_HOME}}/meta/logs"
      EOF
      {{.GREPTIME_BIN}} metasrv start \
        --config-file {{.GREPTIME_HOME}}/meta/metasrv.toml \
        --store-addrs=127.0.0.1:11001
    depends_on:
      etcd:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11021/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  metasrv-1:
    command: |
      mkdir -p {{.GREPTIME_HOME}}/meta-1
      cat > {{.GREPTIME_HOME}}/meta-1/metasrv.toml <<EOF
      data_home = "{{.GREPTIME_HOME}}/meta-1"

      [grpc]
      bind_addr = "0.0.0.0:11022"
      server_addr = "127.0.0.1:11022"

      [http]
      addr = "0.0.0.0:11023"

      [logging]
      dir = "{{.GREPTIME_HOME}}/meta-1/logs"
      EOF
      {{.GREPTIME_BIN}} metasrv start \
        --config-file {{.GREPTIME_HOME}}/meta-1/metasrv.toml \
        --store-addrs=127.0.0.1:11001
    depends_on:
      etcd:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11023/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  datanode-0:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-datanode 0 0.0.0.0:11030 0.0.0.0:11031
    depends_on:
      metasrv:
        condition: process_healthy
      garage-setup:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11031/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  datanode-1:
    command: |
      GREPTIME_BIN={{.GREPTIME_BIN}} GREPTIME_HOME={{.GREPTIME_HOME}} METASRV_ADDR={{.METASRV_ADDR}} scripts/start-datanode 1 0.0.0.0:11032 0.0.0.0:11033
    depends_on:
      metasrv:
        condition: process_healthy
      garage-setup:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11033/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  frontend:
    command: |
      mkdir -p {{.GREPTIME_HOME}}/frontend/logs
      cat > {{.GREPTIME_HOME}}/frontend/frontend.toml <<EOF
      [http]
      addr = "0.0.0.0:11040"

      [grpc]
      bind_addr = "0.0.0.0:11041"

      [mysql]
      addr = "0.0.0.0:11042"

      [postgres]
      addr = "0.0.0.0:11043"

      [meta_client]
      metasrv_addrs = ["{{.METASRV_ADDR}}"]

      [logging]
      dir = "{{.GREPTIME_HOME}}/frontend/logs"
      EOF
      {{.GREPTIME_BIN}} frontend start \
        --config-file {{.GREPTIME_HOME}}/frontend/frontend.toml
    depends_on:
      metasrv:
        condition: process_healthy
      datanode-0:
        condition: process_healthy
      datanode-1:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11040/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  frontend-1:
    command: |
      mkdir -p {{.GREPTIME_HOME}}/frontend-1/logs
      cat > {{.GREPTIME_HOME}}/frontend-1/frontend.toml <<EOF
      [http]
      addr = "0.0.0.0:11044"

      [grpc]
      bind_addr = "0.0.0.0:11045"

      [mysql]
      addr = "0.0.0.0:11046"

      [postgres]
      addr = "0.0.0.0:11047"

      [meta_client]
      metasrv_addrs = ["{{.METASRV_ADDR}}"]

      [logging]
      dir = "{{.GREPTIME_HOME}}/frontend-1/logs"
      EOF
      {{.GREPTIME_BIN}} frontend start \
        --config-file {{.GREPTIME_HOME}}/frontend-1/frontend.toml
    depends_on:
      metasrv:
        condition: process_healthy
      datanode-0:
        condition: process_healthy
      datanode-1:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11044/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  haproxy:
    command: |
      haproxy -f haproxy.cfg
    depends_on:
      frontend:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11050/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  flownode:
    command: |
      mkdir -p {{.GREPTIME_HOME}}/flownode/logs
      cat > {{.GREPTIME_HOME}}/flownode/flownode.toml <<EOF
      node_id = 0

      [grpc]
      bind_addr = "0.0.0.0:11060"

      [http]
      addr = "0.0.0.0:11061"

      [meta_client]
      metasrv_addrs = ["{{.METASRV_ADDR}}"]

      [logging]
      dir = "{{.GREPTIME_HOME}}/flownode/logs"
      EOF
      {{.GREPTIME_BIN}} flownode start \
        --config-file {{.GREPTIME_HOME}}/flownode/flownode.toml
    depends_on:
      metasrv:
        condition: process_healthy
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11061/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true

  standalone:
    command: |
      GREPTIME_HOME={{.GREPTIME_HOME}} GREPTIME_BIN={{.GREPTIME_BIN}} scripts/start-standalone
    depends_on:
      garage-setup:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: "curl -sf http://127.0.0.1:11070/health"
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 3
    availability:
      restart: on_failure
      max_restarts: 5
    disabled: true
