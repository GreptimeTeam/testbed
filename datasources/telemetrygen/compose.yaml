services:
  telemetrygen:
    image: telemetrygen:latest
    container_name: telemetrygen
    command:
      - traces
      - --otlp-endpoint=host.containers.internal:11050
      - --otlp-http
      - --otlp-insecure
      - --otlp-http-url-path=/v1/otlp/v1/traces
      - --otlp-header=x-greptime-pipeline-name="greptime_trace_v1"
      - --otlp-header=x-greptime-trace-table-name="opentelemetry_traces4"
      - --traces=250000
      - --child-spans=6
      - --rate=50000
      - --workers=4
      - --batch-size=500
