# Telemetrygen datasources for GreptimeDB.
#
# This file defines only the finite OTLP TRACE burst:
#   - telemetrygen            : 250k-trace burst that exits when done
#                               (./testbedctl telemetrygen up | down)
#
# Continuous METRICS are generated by a separate single Python OTLP process,
# NOT by this compose file:
#   - gen_metrics.py          : emits ~50 randomized metric names (Gauge/Sum/Histogram)
#                               (./testbedctl telemetrygen metrics up | down)
# See datasources/telemetrygen/gen_metrics.py and "OpenTelemetry Metrics" in AGENTS.md.
services:
  telemetrygen:
    image: telemetrygen:latest
    container_name: telemetrygen
    command:
      - traces
      - --otlp-endpoint=host.containers.internal:11050
      - --otlp-http
      - --otlp-insecure
      - --otlp-http-url-path=/v1/otlp/v1/traces
      - --otlp-header=x-greptime-pipeline-name="greptime_trace_v1"
      - --otlp-header=x-greptime-trace-table-name="opentelemetry_traces4"
      - --traces=250000
      - --child-spans=6
      - --rate=50000
      - --workers=4
      - --batch-size=500
